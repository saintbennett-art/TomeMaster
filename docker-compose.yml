version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: tomemaster_redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: tomemaster_api
    depends_on:
      - redis
    ports:
      - "8888:8888"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8888 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tomemaster_worker
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend:/app
    command: celery -A celery_app worker --loglevel=info --concurrency=4
