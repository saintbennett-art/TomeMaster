chapterize_manuscript:
  description: >
    Analyze the following raw manuscript text:
    
    {text}
    
    Insert clean Markdown chapter breaks and titles. Fix pacing or layout inconsistencies if needed.
  expected_output: >
    A structured markdown manuscript with clear chapter demarcations.

marketing_analysis:
  description: >
    Based on the following chapterized manuscript text, write a compelling 
    back-cover blurb and outline key promotional hooks:

    {text}
  expected_output: >
    A marketing report containing a blurb, target demographic, and campaign ideas.

pacing_review:
  description: >
    Read the following chapterized manuscript text and map out the narrative arc.
    Identify emotional beats and any lulls in the pacing:

    {text}
  expected_output: >
    A pacing matrix report outlining the narrative flow and emotional speed.
